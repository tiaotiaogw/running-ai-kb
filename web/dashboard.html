<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Running AI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 40px auto; }
    .card { padding: 10px; border: 1px solid #ddd; margin-bottom: 20px; }
  </style>
</head>
<body>

<h2>🏃 AI 跑步训练数据仪表盘</h2>

<div class="card">
  <button onclick="loadData()">刷新数据</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card" id="summary"></div>

<script>
let chart;

async function loadData(){
  const res = await fetch('http://127.0.0.1:8000/analytics/summary');
  const data = await res.json();

  document.getElementById('summary').innerHTML = `
    <p>用户: ${data.user}</p>
    <p>心率: ${data.heart_rate}</p>
    <p>疲劳: ${data.fatigue}</p>
    <p>训练负荷: ${data.weekly_load_estimate}</p>
    <p>建议: ${data.recommendation}</p>
    <p>状态: ${data.status}</p>
  `;

  const ctx = document.getElementById('chart');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['心率', '疲劳*100', '训练负荷'],
      datasets: [{
        label: '训练指标',
        data: [data.heart_rate, data.fatigue*100, data.weekly_load_estimate]
      }]
    }
  });
}
</script>

</body>
</html>
